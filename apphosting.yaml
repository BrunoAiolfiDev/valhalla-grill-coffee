# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0

# Environment variables and secrets.
env:
  # Firebase public config (safe to expose — used in browser)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDrSfX0dximhk_ZaErR_ypCF-zZsntJ0mk
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: valhalla-grill-coffee.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: valhalla-grill-coffee
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: valhalla-grill-coffee.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1015657099413"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1015657099413:web:13f4f9dc32aae0cae76b9c
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_EMAIL
    value: admin@valhallacoffee.ie
    availability:
      - BUILD
      - RUNTIME

  # Secrets (stored in Cloud Secret Manager)
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: STRIPE_PUBLIC_KEY
    secret: STRIPE_PUBLIC_KEY
    availability:
      - RUNTIME

  - variable: DRIVER_PIN
    secret: DRIVER_PIN
    availability:
      - RUNTIME
